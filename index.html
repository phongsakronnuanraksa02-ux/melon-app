<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ขายแตงโม</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #b7d3c2;
}

.container {
  background: #f2f2f2;
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
}

h2 { text-align: center; }

.buttons {
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 15px;
  border-radius: 15px;
  border: 1px solid #ccc;
  font-size: 16px;
}

.active {
  border: 2px solid green;
}

input {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
  text-align: center;
}

.save-btn {
  width: 100%;
  margin-top: 15px;
  padding: 15px;
  background: lightgreen;
  border: none;
  border-radius: 15px;
  font-size: 18px;
}

ul {
  padding-left: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🍉 ระบบขายแตงโม</h2>

  <p>ชนิดแตงโม</p>
  <div class="buttons">
    <button onclick="selectType(this,'ไร้เมล็ด',25)">ไร้เมล็ด<br>25</button>
    <button onclick="selectType(this,'ตอปิโด',15)">ตอปิโด<br>15ห</button>
    <button onclick="selectType(this,'คิมสัน',15)">คิมสัน<br>15</button>
  </div>

  <p>น้ำหนัก (กก)</p>
  <input type="number" id="weight">

  <p>ราคาที่เก็บจริง (บาท)</p>
  <input type="number" id="real">

  <button class="save-btn" onclick="save()">+ บันทึกรายขาย</button>

  <h3>💰 ยอดรวม: <span id="total">0</span></h3>

  <h4>📋 รายการ</h4>
  <ul id="list"></ul>
</div>

<script>
let type = "";
let pricePerKg = 0;

// 🔥 ใส่ URL ของมึงตรงนี้
const API_URL = "https://script.google.com/macros/s/AKfycbzuryhHMVBqM-9pIONhDiuYDdbQU-tl0hsyogGsV2CAqU6qmhO2iZ7YAv3W_qyHERA0Ig/exec";

// เลือกประเภท
function selectType(btn,name,price){
  document.querySelectorAll(".buttons button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  type = name;
  pricePerKg = price;
}

// 🔥 โหลดข้อมูลจาก Google Sheets
function loadData(){
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {
      let total = 0;
      let list = document.getElementById("list");
      list.innerHTML = "";

      data.slice(1).reverse().forEach(row => {
        let type = row[1];
        let weight = row[2];
        let price = row[3];

        total += parseFloat(price);

        let li = document.createElement("li");
        li.innerText = `${type} ${weight}กก. = ${price}฿`;
        list.appendChild(li);
      });

      document.getElementById("total").innerText = total;
    });
}

// 🔥 บันทึกข้อมูล
function save(){
  let weight = document.getElementById("weight").value;
  let real = document.getElementById("real").value;

  if(!type || !weight || !real){
    alert("กรอกให้ครบ");
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      type: type,
      weight: weight,
      price: real
    })
  })
  .then(() => {
    loadData(); // โหลดใหม่ทันที
  });

  // reset
  document.getElementById("weight").value = "";
  document.getElementById("real").value = "";
}

// โหลดทันทีตอนเปิด
loadData();
</script>

</body>
</html>
