<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ขายแตงโม</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #b7d3c2;
}

.container {
  background: #f2f2f2;
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
}

h2 {
  text-align: center;
}

.buttons {
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 15px;
  border-radius: 15px;
  border: 1px solid #ccc;
  font-size: 16px;
}

.active {
  border: 2px solid green;
}

input {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
  text-align: center;
}

.save-btn {
  width: 100%;
  margin-top: 15px;
  padding: 15px;
  background: lightgreen;
  border: none;
  border-radius: 15px;
  font-size: 18px;
}

ul {
  padding-left: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🍉 ระบบขายแตงโม</h2>

  <p>ชนิดแตงโม</p>
  <div class="buttons">
    <button onclick="selectType(this,'ไร้เมล็ด',25)">ไร้เมล็ด<br>25</button>
    <button onclick="selectType(this,'ตอปิโด',20)">ตอปิโด<br>20</button>
    <button onclick="selectType(this,'คิมสัน',18)">คิมสัน<br>18</button>
  </div>

  <p>น้ำหนัก (กก)</p>
  <input type="number" id="weight" oninput="calc()">

  <p>ราคาที่เก็บจริง (บาท)</p>
  <input type="number" id="real">

  <button class="save-btn" onclick="save()">+ บันทึกรายขาย</button>

  <h3>💰 ยอดรวม: <span id="total">0</span></h3>

  <h4>📋 รายการ</h4>
  <ul id="list"></ul>
</div>

<script>
let type = "";
let pricePerKg = 0;

// โหลดข้อมูลจากเครื่อง
let total = localStorage.getItem("total") ? parseFloat(localStorage.getItem("total")) : 0;
let history = localStorage.getItem("history") ? JSON.parse(localStorage.getItem("history")) : [];

document.getElementById("total").innerText = total;
renderHistory();

function selectType(btn,name,price){
  document.querySelectorAll(".buttons button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  type = name;
  pricePerKg = price;
}

function calc(){
  let w = document.getElementById("weight").value;
}

function save(){
  let weight = document.getElementById("weight").value;
  let real = document.getElementById("real").value;

  if(!type || !weight || !real){
    alert("กรอกให้ครบ");
    return;
  }

  total += parseFloat(real);
  document.getElementById("total").innerText = total;

  let item = {
    text: `${type} ${weight}กก. = ${real}฿`,
    time: new Date().toLocaleTimeString()
  };

  history.push(item);

  // เซฟในเครื่อง
  localStorage.setItem("total", total);
  localStorage.setItem("history", JSON.stringify(history));

  renderHistory();

  // 🔥 ส่งไป Google Sheets
  fetch("https://script.google.com/macros/s/AKfycbzuryhHMVBqM-9pIONhDiuYDdbQU-tl0hsyogGsV2CAqU6qmhO2iZ7YAv3W_qyHERA0Ig/exec", {
    method: "POST",
    body: JSON.stringify({
      type: type,
      weight: weight,
      price: real
    })
  });

  // reset
  document.getElementById("weight").value = "";
  document.getElementById("real").value = "";
}

function renderHistory(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  history.slice().reverse().forEach(item => {
    let li = document.createElement("li");
    li.innerText = `${item.time} | ${item.text}`;
    list.appendChild(li);
  });
}
</script>

</body>
</html>
