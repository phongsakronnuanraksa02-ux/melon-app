<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สวนด็อกเตอร์ POS - ระบบจัดการร้านแตงโม</title>
<style>
  :root {
    --primary: #2ecc71;
    --dark-green: #27ae60;
    --danger: #ff7675;
    --warning: #f1c40f;
    --bg: #b7d3c2;
  }

  body { margin: 0; font-family: 'Kanit', sans-serif; background: var(--bg); padding-bottom: 50px; }
  
  .container { 
    background: #fff; 
    margin: 20px auto; 
    max-width: 500px; 
    padding: 25px; 
    border-radius: 25px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
  }

  h2 { text-align: center; color: #2d5a27; margin-top: 0; }

  /* ส่วนเลือกชนิด */
  .buttons { display: flex; gap: 8px; margin-bottom: 15px; }
  button.type-btn { 
    flex: 1; padding: 12px 5px; border-radius: 12px; border: 2px solid #ddd; 
    background: #fff; cursor: pointer; font-size: 14px; transition: 0.2s;
  }
  button.type-btn.active { 
    border-color: var(--primary); background: #e8f5e9; font-weight: bold; color: var(--dark-green);
    transform: scale(1.05);
  }

  /* ส่วน Input */
  p { margin: 10px 0 5px 0; font-weight: bold; font-size: 14px; }
  input { 
    width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; 
    border: 1px solid #ccc; font-size: 18px; text-align: center; box-sizing: border-box; 
  }
  .calc-auto { background: #fff9e6; color: #d35400; border: 1px dashed #f39c12; font-weight: bold; }

  .save-btn { 
    width: 100%; padding: 18px; background: var(--primary); color: white; 
    border: none; border-radius: 15px; font-size: 20px; font-weight: bold; 
    cursor: pointer; box-shadow: 0 4px 0 var(--dark-green); margin-top: 10px;
  }
  .save-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--dark-green); }

  /* สรุปยอด */
  .shift-box { 
    background: #00cec9; color: white; padding: 20px; border-radius: 15px; 
    margin-top: 20px; text-align: center; font-size: 20px; font-weight: bold;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
  }

  .close-btn {
    width: 100%; margin-top: 10px; padding: 12px; background: #636e72; 
    color: white; border: none; border-radius: 12px; cursor: pointer;
    font-weight: bold; font-family: 'Kanit';
  }

  /* รายการประวัติ */
  .history { margin-top: 25px; }
  ul { padding: 0; list-style: none; margin: 0; }
  li { 
    padding: 15px; border-bottom: 1px solid #eee; display: flex; 
    justify-content: space-between; align-items: center; background: #fdfdfd; 
    margin-bottom: 8px; border-radius: 12px;
  }
  .item-info b { color: #2d3436; font-size: 16px; }
  .item-info small { color: #636e72; }
  
  .del-btn { 
    background: var(--danger); color: white; border: none; padding: 8px 12px; 
    border-radius: 8px; cursor: pointer; font-size: 12px; font-family: 'Kanit';
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
  <h2>🍉 สวนด็อกเตอร์ POS Pro</h2>

  <p>เลือกชนิดแตงโม</p>
  <div class="buttons">
    <button class="type-btn" onclick="selectType(this,'ไร้เมล็ด',25)">ไร้เมล็ด<br>25.-</button>
    <button class="type-btn" onclick="selectType(this,'ตอปิโด',15)">ตอปิโด<br>15.-</button>
    <button class="type-btn" onclick="selectType(this,'คิมสัน',15)">คิมสัน<br>15.-</button>
  </div>

  <p>น้ำหนัก (กก.)</p>
  <input type="number" id="weight" placeholder="0.00" step="0.1" oninput="calculate()">
  
  <p>ราคาตามน้ำหนัก (เศษ)</p>
  <input type="text" id="autoPrice" class="calc-auto" readonly placeholder="ระบบคำนวณให้">
  
  <p>ราคาที่เก็บจริง (บาท)</p>
  <input type="number" id="real" placeholder="ปัดเศษแล้วใส่ตรงนี้">

  <button class="save-btn" id="btnSave" onclick="save()">บันทึกรายขาย</button>

  <div class="shift-box">
    ยอดขายรอบปัจจุบัน<br>
    <span id="shiftTotal" style="font-size: 32px;">0</span> <small style="font-size: 16px;">บาท</small>
  </div>

  <button class="close-btn" onclick="closeShop()">🔒 ปิดร้าน / สรุปยอดรอบนี้</button>

  <div class="history">
    <p>📋 รายการขายรอบนี้</p>
    <ul id="list">กำลังโหลดข้อมูล...</ul>
  </div>
</div>

<script>
let selectedType = "", pricePerKg = 0;
// *** เปลี่ยน API_URL เป็นของคุณ ***
const API_URL = "https://script.google.com/macros/s/AKfycbzuryhHMVBqM-9pIONhDiuYDdbQU-tl0hsyogGsV2CAqU6qmhO2iZ7YAv3W_qyHERA0Ig/exec";

function selectType(btn, n, p) {
  document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  selectedType = n; pricePerKg = p; calculate();
}

function calculate() {
  let w = document.getElementById("weight").value;
  document.getElementById("autoPrice").value = w ? (w * pricePerKg).toFixed(2) + " บาท" : "";
}

function loadData() {
  fetch(API_URL).then(res => res.json()).then(data => {
    let list = document.getElementById("list");
    let shiftTotal = 0;
    list.innerHTML = "";
    
    if (data && data.length > 1) {
      // ค้นหาจุดปิดร้านล่าสุด
      let lastCloseIndex = 0;
      for(let i = data.length - 1; i >= 1; i--) {
        if(data[i][1] === "--- ปิดร้าน ---") {
          lastCloseIndex = i;
          break;
        }
      }

      // แสดงเฉพาะรายการที่เกิดขึ้นหลังจากปิดร้านครั้งล่าสุด
      for (let i = data.length - 1; i > lastCloseIndex; i--) {
        let row = data[i];
        let type = row[1];
        let weight = row[2];
        let price = parseFloat(row[3]);

        if (!type || isNaN(price)) continue;

        shiftTotal += price;

        let li = document.createElement("li");
        li.innerHTML = `
          <div class="item-info">
            <b>${type}</b><br>
            <small>${weight} กก. | ราคา ${price.toLocaleString()}฿</small>
          </div>
          <button class="del-btn" onclick="deleteRow(${i + 1})">ลบ</button>
        `;
        list.appendChild(li);
      }
    }
    
    if(list.innerHTML === "") list.innerHTML = "<li style='justify-content:center; color:#999;'>ยังไม่มีรายการในรอบนี้</li>";
    document.getElementById("shiftTotal").innerText = shiftTotal.toLocaleString();
  }).catch(err => {
    document.getElementById("list").innerHTML = "<li>โหลดข้อมูลไม่สำเร็จ</li>";
  });
}

function save() {
  let w = document.getElementById("weight").value, r = document.getElementById("real").value;
  if (!selectedType || !w || !r) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");
  
  let btn = document.getElementById("btnSave");
  btn.disabled = true;
  btn.innerText = "กำลังบันทึก...";

  const payload = new URLSearchParams({type: selectedType, weight: w, price: r});

  fetch(API_URL, {
    method: "POST", mode: "no-cors",
    body: payload
  }).then(() => {
    setTimeout(() => { 
      loadData(); 
      btn.disabled = false;
      btn.innerText = "บันทึกรายขาย";
      document.getElementById("weight").value = ""; 
      document.getElementById("real").value = "";
      document.getElementById("autoPrice").value = "";
    }, 1500);
  });
}

function deleteRow(rowNum) {
  if (!confirm("ต้องการลบรายการนี้ใช่หรือไม่?")) return;
  fetch(API_URL, {
    method: "POST", mode: "no-cors",
    body: new URLSearchParams({action: 'delete', row: rowNum})
  }).then(() => {
    alert("ลบรายการแล้ว");
    loadData();
  });
}

function closeShop() {
  let total = document.getElementById("shiftTotal").innerText;
  if (total === "0") return alert("ยังไม่มีเครื่องขายในรอบนี้");
  if (!confirm("ยืนยันการปิดร้านและสรุปยอด " + total + " บาท?\nยอดขายรอบใหม่จะเริ่มนับจาก 0")) return;
  
  fetch(API_URL, {
    method: "POST", mode: "no-cors",
    body: new URLSearchParams({action: 'closeShop', total: total})
  }).then(() => {
    alert("สรุปยอดและปิดร้านสำเร็จ!");
    loadData();
  });
}

// โหลดข้อมูลทันทีเมื่อเปิดเว็บ
loadData();
</script>
</body>
</html>
